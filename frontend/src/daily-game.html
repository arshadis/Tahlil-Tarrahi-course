<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>بازی روزانه</title>
  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 32px;
    }
    .scenario-box {
      background: #eff6ff;
      color: #1e3a8a;
      border: 1px solid #bfdbfe;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-weight: bold;
    }

    .question-image {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      background: #f9fafb;
      border-radius: 12px;
      margin: 16px 0;
      border: 1px solid #e5e7eb;
    }

    .blank-input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      font-size: 18px;
      margin-top: 12px;
      text-align: right;
    }
    .review-badge {
      display: inline-block;
      margin-bottom: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #fef3c7;
      color: #92400e;
      font-weight: bold;
    }

    .card {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,.08);
    }

    button {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .option {
      background: #e5e7eb;
    }

    .primary {
      background: #2563eb;
      color: white;
    }

    .score-box {
      background: #ecfdf5;
      border: 1px solid #bbf7d0;
      color: #166534;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 16px;
    }

    .result {
      margin-top: 16px;
      font-weight: bold;
    }
    .option {
      background: #e5e7eb;
      transition: all 0.2s ease;
    }

    .option:hover {
      background: #d1d5db;
      transform: translateY(-1px);
    }

    .option:active {
      transform: scale(0.98);
    }

    .option.correct {
      background: #bbf7d0;
      color: #166534;
      border: 2px solid #22c55e;
    }

    .option.wrong {
      background: #fecaca;
      color: #991b1b;
      border: 2px solid #ef4444;
    }
    .secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .feedback {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: bold;
      animation: popFeedback 0.25s ease;
    }

    .feedback.success {
      background: #ecfdf5;
      color: #166534;
      border: 1px solid #86efac;
    }

    .feedback.error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    @keyframes popFeedback {
      from {
        opacity: 0;
        transform: scale(0.96);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>بازی روزانه</h1>
    <div id="content">در حال دریافت مرحله امروز...</div>
  </div>

  <script>
    const token = localStorage.getItem("access_token");

    if (!token) {
      window.location.href = "/login.html";
    }

    let sessionId = null;
    let questions = [];
    let currentIndex = 0;
    let sessionScore = 0;
    let totalScore = 0;
    let correctCount = 0;
    let wrongCount = 0;
async function pauseGame() {
  if (!sessionId) return;

  const res = await fetch("/api/game/pause", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      session_id: sessionId
    })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.detail || "خطا در توقف بازی.");
    return;
  }

  alert("بازی متوقف شد. بعداً می‌توانید از همین نقطه ادامه دهید.");
  window.location.href = "/game-home.html";
}
    async function loadStage() {
      const res = await fetch("/api/game/start", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + token
        }
      });

      if (!res.ok) {
        document.getElementById("content").textContent = "مرحله امروز پیدا نشد.";
        return;
      }

      const data = await res.json();

      sessionId = data.session.id;
      questions = data.questions;
      sessionScore = data.session.score;
      totalScore = data.user.total_score;
      currentIndex = data.session.current_question_index || 0;

      renderQuestion();
    }

    function renderQuestion() {
      const question = questions[currentIndex];

      if (!question) {
        finishStage();
        return;
      }

      const content = document.getElementById("content");

      content.innerHTML = `
        <div class="score-box">
          امتیاز این مرحله: ${sessionScore}
          <br />
          امتیاز کل شما: ${totalScore}
        </div>
        <button class="secondary" onclick="pauseGame()">
          توقف موقت
        </button>
        <p>سوال ${currentIndex + 1} از ${questions.length}</p>

        ${question.is_review ? `<div class="review-badge">🔁 ${question.review_label}</div>` : ""}

        <div class="scenario-box">
          سناریو آموزشی: ${question.topic}
        </div>

        ${question.image_url ? `<img class="question-image" src="${question.image_url}" alt="تصویر سوال" />` : ""}

        <h2>${question.title}</h2>

        <div id="options"></div>
        <div id="feedback" class="result"></div>
      `;

      const optionsContainer = document.getElementById("options");

      if (question.question_type === "multiple_choice" || question.question_type === "image") {
        question.options.forEach(option => {
          const button = document.createElement("button");
          button.className = "option";
          button.textContent = option.text;
          button.onclick = () => submitAnswer(question.id, option.text, button);
          optionsContainer.appendChild(button);
        });
      }

      if (question.question_type === "fill_blank") {
        optionsContainer.innerHTML = `
          <input id="blankAnswer" class="blank-input" placeholder="پاسخ خود را وارد کنید" />
          <button class="primary" onclick="submitBlankAnswer(${question.id})">
            ثبت پاسخ
          </button>
        `;
      }
    }

    async function submitAnswer(questionId, answer, selectedButton) {
    const buttons = document.querySelectorAll(".option");
    buttons.forEach(btn => btn.disabled = true);

    const res = await fetch("/api/game/submit-answer", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        session_id: sessionId,
        question_id: questionId,
        answer: answer
      })
    });

    const data = await res.json();
    const feedback = document.getElementById("feedback");

    if (!res.ok) {
      feedback.className = "feedback error";
      feedback.textContent = data.detail || "خطا در ثبت پاسخ.";

      if (data.detail === "این سوال قبلاً پاسخ داده شده است.") {
        setTimeout(() => {
          currentIndex++;
          renderQuestion();
        }, 1200);
      }

      return;
    }

    sessionScore = data.session_score;
    totalScore = data.user_total_score;

    if (data.is_correct) {
      correctCount++;
      if (selectedButton) selectedButton.classList.add("correct");

      feedback.className = "feedback success";
      feedback.textContent =
        `پاسخ صحیح است. ${data.score_earned} امتیاز دریافت کردید.`;
    } else {
      wrongCount++;
      if (selectedButton) selectedButton.classList.add("wrong");
      feedback.className = "feedback error";
      feedback.textContent =
        `پاسخ نادرست است. ${data.explanation || "پاسخ صحیح را مرور کنید."}`;
    }

    setTimeout(() => {
      currentIndex++;
      renderQuestion();
    }, 1600);
  }
    function submitBlankAnswer(questionId) {
      const input = document.getElementById("blankAnswer");
      const answer = input.value.trim();

      if (!answer) {
        document.getElementById("feedback").className = "feedback error";
        document.getElementById("feedback").textContent = "لطفاً پاسخ را وارد کنید.";
        return;
      }

      submitAnswer(questionId, answer, null);
    }
    async function finishStage() {
      const res = await fetch("/api/game/finish", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
          session_id: sessionId
        })
      });

      const data = await res.json();

      document.getElementById("content").innerHTML = `
        <h2>مرحله امروز تمام شد</h2>
        <p>امتیاز این مرحله: ${data.score}</p>
        <p>امتیاز کل شما: ${data.user_total_score}</p>
        <p>تعداد پاسخ صحیح: ${data.correct_count}</p>
        <p>تعداد پاسخ غلط: ${data.wrong_count}</p>
        <button class="primary" onclick="window.location.href='/game-home.html'">
          بازگشت به صفحه اصلی
        </button>
      `;
    }

    loadStage();
  </script>
</body>
</html>
