<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>افزودن سوال جدید</title>
  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      background: #f5f7fb;
      padding: 32px;
    }

    .card {
      max-width: 760px;
      margin: 0 auto;
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,.08);
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      font-size: 16px;
    }

    button {
      margin-top: 18px;
      width: 100%;
      padding: 14px;
      border: 0;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .message {
      margin-top: 16px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>افزودن سوال جدید</h1>

    <label>متن سوال</label>
    <textarea id="title"></textarea>

    <label>نوع سوال</label>
    <select id="questionType">
      <option value="multiple_choice">چهارگزینه‌ای</option>
      <option value="fill_blank">جای خالی</option>
      <option value="image">تصویری</option>
    </select>

    <label>موضوع آموزشی</label>
    <input id="topic" placeholder="مثلاً امنیت ایمیل" />

    <label>سطح سختی</label>
    <select id="difficulty">
      <option value="easy">آسان</option>
      <option value="medium">متوسط</option>
      <option value="hard">دشوار</option>
    </select>

    <label>گزینه‌ها برای سوال چهارگزینه‌ای یا تصویری</label>
    <input id="option1" placeholder="گزینه ۱" />
    <input id="option2" placeholder="گزینه ۲" />
    <input id="option3" placeholder="گزینه ۳" />
    <input id="option4" placeholder="گزینه ۴ اختیاری" />

    <label>پاسخ صحیح</label>
    <input id="correctAnswer" />

    <label>توضیح پاسخ اشتباه</label>
    <textarea id="explanation"></textarea>

    <label>تصویر سوال، در صورت نیاز</label>
    <input id="image" type="file" accept="image/*" />

    <button onclick="submitQuestion()">ذخیره سوال</button>

    <div id="message" class="message"></div>
  </div>

  <script>
    const token = localStorage.getItem("access_token");

if (!token) {
  sessionStorage.setItem("post_login_redirect", "/admin-add-question.html");
  window.location.href = "/login.html?redirect=/admin-add-question.html";
}

    async function submitQuestion() {
      const message = document.getElementById("message");
      message.textContent = "";

      const questionType = document.getElementById("questionType").value;

      const options = [
        document.getElementById("option1").value.trim(),
        document.getElementById("option2").value.trim(),
        document.getElementById("option3").value.trim(),
        document.getElementById("option4").value.trim(),
      ].filter(Boolean);

      const formData = new FormData();
      formData.append("title", document.getElementById("title").value.trim());
      formData.append("question_type", questionType);
      formData.append("difficulty", document.getElementById("difficulty").value);
      formData.append("topic", document.getElementById("topic").value.trim());
      formData.append("correct_answer", document.getElementById("correctAnswer").value.trim());
      formData.append("explanation", document.getElementById("explanation").value.trim());
      formData.append("options_json", JSON.stringify(options));

      const image = document.getElementById("image").files[0];
      if (image) {
        formData.append("image", image);
      }

      const res = await fetch("/api/admin/questions", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + token
        },
        body: formData
      });

      const data = await res.json();

      if (!res.ok) {
        message.style.color = "#991b1b";
        message.textContent = data.detail || "خطا در ذخیره سوال.";
        return;
      }
        message.style.color = "#166534";
        message.textContent = "سوال با موفقیت اضافه شد. در حال انتقال به صفحه اصلی...";

        setTimeout(() => {
        window.location.href = "/game-home.html";
        }, 1200);
    }
  </script>
</body>
</html>
