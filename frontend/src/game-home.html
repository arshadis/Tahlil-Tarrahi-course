<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>صفحه اصلی بازی آموزشی</title>

  <style>
    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: #f5f7fb;
      color: #111827;
    }

    header {
      background: #0f172a;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    main {
      max-width: 900px;
      margin: 32px auto;
      padding: 0 16px;
    }
    

    .card {
      background: white;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,.08);
    }

    .actions {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 18px;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }

    .primary {
      background: #2563eb;
      color: white;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      background: #ecfdf5;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      color: #166534;
    }
  </style>
</head>

<body>
  <header>
    <strong>بازی آموزشی</strong>
    <button class="secondary" onclick="logout()">خروج</button>
  </header>

  <main>
    <div class="card">
      <h1>به بازی آموزشی خوش آمدید</h1>
      <p>ورود موفق بود. این صفحه مقصد بعد از Login است.</p>

      <div class="status">
        برنامه از طریق مرورگر وب اجرا شده و نیاز به نصب نرم‌افزار جداگانه ندارد.
      </div>

      <div class="actions">
        <button class="primary" onclick="startGame()">شروع بازی روزانه</button>
        <button class="secondary" onclick="checkBrowser()">بررسی مرورگر</button>
      </div>

      <p id="message"></p>
    </div>
  </main>

  <script>
    const token = localStorage.getItem("access_token");

    if (!token) {
      window.location.href = "/login.html";
    }

    function startGame() {
      window.location.href = "/daily-game.html";
    }

    function checkBrowser() {
      document.getElementById("message").textContent =
        "مرورگر شما پشتیبانی می‌شود: " + navigator.userAgent;
    }

    function logout() {
      localStorage.removeItem("access_token");
      window.location.href = "/login.html";
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/service-worker.js");
    }
  </script>
</body>
</html>
