services:
  db:
    image: postgres:16-alpine
    container_name: scrum_game_db
    environment:
      POSTGRES_DB: scrum_game
      POSTGRES_USER: scrum_user
      POSTGRES_PASSWORD: scrum_pass
    ports:
      - "5432:5432"
    volumes:
      - scrum_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrum_user -d scrum_game"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: scrum_game_backend
    env_file:
      - ./backend/.env.docker
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: scrum_game_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  scrum_postgres_data:
